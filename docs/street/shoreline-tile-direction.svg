<svg width="1480" height="1080" viewBox="0 0 1480 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172128"/>
      <stop offset="1" stop-color="#0D1318"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#182126"/>
      <stop offset="1" stop-color="#12191E"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7EA3B7"/>
      <stop offset="0.55" stop-color="#64889A"/>
      <stop offset="1" stop-color="#3C6275"/>
    </linearGradient>
    <linearGradient id="shore" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#DDCFAB"/>
      <stop offset="1" stop-color="#C9B98E"/>
    </linearGradient>
    <linearGradient id="quay" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#827666"/>
      <stop offset="1" stop-color="#5B544C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { fill: #F0E5D3; font: 700 42px Georgia, 'Iowan Old Style', serif; }
      .subtitle { fill: #C2CDD3; font: 400 18px Inter, Arial, sans-serif; }
      .section { fill: #F0E5D3; font: 700 24px Inter, Arial, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .label { fill: #F0E5D3; font: 700 16px Inter, Arial, sans-serif; }
      .note { fill: #9EACB4; font: 400 14px Inter, Arial, sans-serif; }
      .tiny { fill: #9EACB4; font: 400 12px Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1480" height="1080" fill="url(#bg)"/>

  <text x="72" y="88" class="title">Shoreline Tile Direction</text>
  <text x="72" y="122" class="subtitle">These are the tile families I would build so both the builder preview and the Phaser runtime read from the same coastal vocabulary.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="162" width="1372" height="858" rx="28" fill="url(#panel)" stroke="#27343C"/>
  </g>

  <text x="94" y="214" class="section">Core Tiles</text>

  <!-- Tile card helper layout -->
  <g transform="translate(92,246)">
    <!-- row 1 -->
    <g transform="translate(0,0)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#sea)"/>
      <path d="M46 58 C68 48, 88 48, 108 58 C130 68, 150 68, 166 58" stroke="#D7EEF6" stroke-opacity="0.44" stroke-width="4" stroke-linecap="round"/>
      <path d="M40 94 C62 84, 84 84, 106 94 C126 104, 148 104, 168 94" stroke="#EAF8FC" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round"/>
      <path d="M52 118 C74 108, 96 110, 116 118 C136 126, 152 126, 168 120" stroke="#BFE0EB" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Open Water</text>
      <text x="24" y="192" class="note">Base sea tile with layered wave streaks.</text>
    </g>

    <g transform="translate(228,0)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#sea)"/>
      <rect x="24" y="22" width="160" height="44" fill="#86A9BC" fill-opacity="0.15"/>
      <path d="M32 74 C52 66, 74 66, 94 74 C116 82, 138 82, 176 70" stroke="#F3FBFF" stroke-opacity="0.52" stroke-width="5" stroke-linecap="round"/>
      <path d="M42 102 C62 94, 84 92, 106 100 C126 108, 150 108, 170 102" stroke="#D6EEF6" stroke-opacity="0.26" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Open Water Alt</text>
      <text x="24" y="192" class="note">Variation tile to break repetition in wide sea areas.</text>
    </g>

    <g transform="translate(456,0)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#shore)"/>
      <rect x="24" y="104" width="160" height="38" fill="url(#sea)"/>
      <rect x="24" y="98" width="160" height="12" fill="#8A7552" fill-opacity="0.45"/>
      <g fill="#78634B">
        <ellipse cx="52" cy="90" rx="8" ry="6"/>
        <ellipse cx="86" cy="88" rx="10" ry="7"/>
        <ellipse cx="134" cy="91" rx="9" ry="7"/>
      </g>
      <path d="M36 106 C56 102, 78 102, 98 106 C118 110, 146 110, 172 104" stroke="#F5F0E4" stroke-width="5" stroke-linecap="round"/>
      <path d="M42 116 C62 112, 84 112, 104 116 C126 120, 144 120, 170 114" stroke="#D6EDF6" stroke-opacity="0.42" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Rocky Shore Top</text>
      <text x="24" y="192" class="note">Land cutoff band, rubble, then foam into water.</text>
    </g>

    <g transform="translate(684,0)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#shore)"/>
      <rect x="110" y="22" width="74" height="120" fill="url(#sea)"/>
      <rect x="104" y="22" width="12" height="120" fill="#8A7552" fill-opacity="0.45"/>
      <g fill="#78634B">
        <ellipse cx="98" cy="44" rx="6" ry="8"/>
        <ellipse cx="96" cy="76" rx="7" ry="10"/>
        <ellipse cx="100" cy="112" rx="6" ry="8"/>
      </g>
      <path d="M110 36 C114 54, 114 72, 110 90 C106 106, 106 122, 111 136" stroke="#F5F0E4" stroke-width="5" stroke-linecap="round"/>
      <path d="M118 44 C122 60, 122 76, 118 92 C114 108, 114 122, 120 132" stroke="#D6EDF6" stroke-opacity="0.42" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Rocky Shore Side</text>
      <text x="24" y="192" class="note">Same read, rotated for east/west coast edges.</text>
    </g>

    <g transform="translate(912,0)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#shore)"/>
      <path d="M24 142 L24 90 Q24 78 36 78 L94 78 Q108 78 108 64 L108 22 L184 22 L184 142 Z" fill="url(#sea)"/>
      <path d="M104 22 L104 64 Q104 74 96 74 L36 74 Q28 74 28 82 L28 142" stroke="#8A7552" stroke-opacity="0.45" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M108 28 L108 64 Q108 78 94 78 L40 78 Q32 78 32 88 L32 138" stroke="#F5F0E4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M116 34 L116 64 Q116 84 96 84 L46 84 Q38 84 38 92 L38 134" stroke="#D6EDF6" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="170" class="label">Rocky Shore Corner</text>
      <text x="24" y="192" class="note">Convex corner where land turns into the sea.</text>
    </g>

    <g transform="translate(1140,0)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#sea)"/>
      <rect x="24" y="30" width="160" height="18" fill="#F5FBFF" fill-opacity="0.34"/>
      <path d="M34 48 C54 40, 78 40, 102 48 C126 56, 148 56, 176 46" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="5" stroke-linecap="round"/>
      <path d="M38 60 C58 52, 80 52, 102 60 C124 68, 148 68, 170 60" stroke="#D4EDF6" stroke-opacity="0.48" stroke-width="3" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Foam Strip</text>
      <text x="24" y="192" class="note">Supplementary tile for extra wave energy at shore.</text>
    </g>

    <!-- row 2 -->
    <g transform="translate(0,242)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#quay)"/>
      <rect x="24" y="96" width="160" height="46" fill="url(#sea)"/>
      <rect x="24" y="88" width="160" height="10" fill="#A39B8B" fill-opacity="0.44"/>
      <path d="M44 102 C64 98, 86 98, 108 102 C130 106, 150 106, 170 100" stroke="#F2FBFF" stroke-width="4" stroke-linecap="round"/>
      <path d="M42 32 L42 138 M78 32 L78 138 M114 32 L114 138 M150 32 L150 138" stroke="#47443F" stroke-opacity="0.48" stroke-width="3"/>
      <text x="24" y="170" class="label">Quay Wall Top</text>
      <text x="24" y="192" class="note">Hard harbor edge with sea directly against stone.</text>
    </g>

    <g transform="translate(228,242)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#quay)"/>
      <path d="M106 22 L106 86 Q106 94 98 94 L24 94 L24 142 L184 142 L184 22 Z" fill="url(#sea)"/>
      <path d="M104 26 L104 84 Q104 90 98 90 L28 90" stroke="#F2FBFF" stroke-width="4" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Quay Corner</text>
      <text x="24" y="192" class="note">Hard-edged harbor corner transition tile.</text>
    </g>

    <g transform="translate(456,242)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#shore)"/>
      <g fill="#756148">
        <ellipse cx="54" cy="96" rx="10" ry="8"/>
        <ellipse cx="80" cy="88" rx="7" ry="6"/>
        <ellipse cx="102" cy="100" rx="9" ry="7"/>
        <ellipse cx="136" cy="92" rx="11" ry="8"/>
        <ellipse cx="158" cy="102" rx="8" ry="6"/>
      </g>
      <g fill="#AB997C">
        <ellipse cx="53" cy="94" rx="6" ry="4"/>
        <ellipse cx="135" cy="90" rx="6" ry="4"/>
      </g>
      <text x="24" y="170" class="label">Rubble Patch</text>
      <text x="24" y="192" class="note">Scatter tile used behind softer natural shoreline.</text>
    </g>

    <g transform="translate(684,242)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#shore)"/>
      <rect x="24" y="106" width="160" height="12" fill="#8B7452" fill-opacity="0.38"/>
      <rect x="24" y="118" width="160" height="24" fill="#3F6476" fill-opacity="0.24"/>
      <path d="M38 114 C58 110, 78 110, 98 114 C118 118, 144 118, 170 112" stroke="#F5F0E4" stroke-width="5" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Cut Bank</text>
      <text x="24" y="192" class="note">Cleaner land lip for straighter, tidier coast sections.</text>
    </g>

    <g transform="translate(912,242)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#sea)"/>
      <rect x="24" y="22" width="160" height="120" fill="none" stroke="#A2D1E0" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="10 12"/>
      <path d="M40 52 C64 42, 90 42, 112 52 C134 62, 154 62, 172 54" stroke="#EAF8FC" stroke-opacity="0.34" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="104" cy="102" rx="30" ry="10" fill="#DFF6FD" fill-opacity="0.14"/>
      <text x="24" y="170" class="label">Deeper Water</text>
      <text x="24" y="192" class="note">Used farther from shore or under larger harbor lanes.</text>
    </g>

    <g transform="translate(1140,242)">
      <rect width="208" height="214" rx="22" fill="#11181D" stroke="#253038"/>
      <rect x="24" y="22" width="160" height="120" rx="18" fill="url(#sea)"/>
      <path d="M42 44 C62 34, 82 34, 102 44 C122 54, 144 54, 168 42" stroke="#E8F8FC" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="106" cy="94" rx="36" ry="12" fill="#000000" fill-opacity="0.12"/>
      <path d="M64 92 H144" stroke="#765A42" stroke-width="12" stroke-linecap="round"/>
      <path d="M76 88 H132" stroke="#D9BE95" stroke-width="4" stroke-linecap="round"/>
      <text x="24" y="170" class="label">Moored Boat Overlay</text>
      <text x="24" y="192" class="note">Not a ground tile, but part of the same coastal kit.</text>
    </g>
  </g>

  <text x="94" y="746" class="section">How They Assemble</text>

  <g transform="translate(92,778)">
    <rect width="1256" height="184" rx="24" fill="#11181D" stroke="#253038"/>

    <!-- mini assembled sample -->
    <g transform="translate(42,28)">
      <rect width="1172" height="126" rx="16" fill="url(#sea)"/>
      <g fill="#CFC09B">
        <rect x="0" y="0" width="412" height="74"/>
        <rect x="436" y="0" width="220" height="74"/>
        <rect x="690" y="0" width="234" height="74"/>
      </g>
      <g fill="#7D684D" fill-opacity="0.35">
        <rect x="0" y="66" width="412" height="8"/>
        <rect x="436" y="66" width="220" height="8"/>
      </g>
      <g fill="#756148">
        <ellipse cx="58" cy="58" rx="10" ry="8"/>
        <ellipse cx="104" cy="60" rx="8" ry="6"/>
        <ellipse cx="318" cy="58" rx="12" ry="8"/>
        <ellipse cx="514" cy="58" rx="8" ry="6"/>
        <ellipse cx="602" cy="58" rx="10" ry="8"/>
      </g>
      <g stroke="#F5F0E4" stroke-width="5" stroke-linecap="round">
        <path d="M18 74 C40 68, 62 68, 84 74 C106 80, 126 80, 150 72"/>
        <path d="M170 74 C192 68, 214 68, 236 74 C258 80, 278 80, 300 72"/>
        <path d="M322 74 C344 68, 366 68, 388 74"/>
        <path d="M454 74 C476 68, 500 68, 522 74 C544 80, 566 80, 590 72"/>
        <path d="M612 74 C634 68, 656 68, 678 74"/>
      </g>
      <g stroke="#D6EDF6" stroke-opacity="0.42" stroke-width="3" stroke-linecap="round">
        <path d="M22 84 C44 78, 66 78, 86 84 C108 90, 130 90, 152 82"/>
        <path d="M458 84 C480 78, 504 78, 526 84 C548 90, 570 90, 592 82"/>
      </g>
      <rect x="690" y="0" width="234" height="78" fill="url(#quay)"/>
      <rect x="690" y="68" width="234" height="10" fill="#A39B8B" fill-opacity="0.45"/>
      <g stroke="#46423D" stroke-opacity="0.5" stroke-width="3">
        <line x1="728" y1="8" x2="728" y2="76"/>
        <line x1="770" y1="8" x2="770" y2="76"/>
        <line x1="812" y1="8" x2="812" y2="76"/>
        <line x1="854" y1="8" x2="854" y2="76"/>
      </g>
      <g stroke="#F2FBFF" stroke-width="4" stroke-linecap="round">
        <path d="M706 74 C726 68, 748 68, 770 74 C792 80, 816 80, 838 74"/>
      </g>
      <g stroke="#EAF8FC" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round">
        <path d="M938 36 C958 26, 982 26, 1004 36 C1028 46, 1050 46, 1070 36"/>
        <path d="M954 74 C974 66, 996 66, 1018 74 C1042 82, 1062 82, 1084 72"/>
      </g>
      <path d="M0 0 H1172" stroke="#FFFFFF" stroke-opacity="0.05"/>
    </g>

    <text x="42" y="170" class="note">Expected result: natural coast sections use rocky/cut-bank edge tiles with foam overlays, while harbor edges switch to hard quay-wall tiles. Open water and deeper-water variants keep the sea from feeling flat.</text>
  </g>

  <text x="94" y="1008" class="tiny">Next implementation step: classify each terrain cell by coastline context (open water, shore edge, shore corner, quay edge, quay corner) and feed the same classification into both the builder preview and Phaser runtime.</text>
</svg>
